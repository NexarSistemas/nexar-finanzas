{% extends "base.html" %}
{% block title %}Transferencia entre cuentas{% endblock %}
{% block content %}

<div class="d-flex align-items-center mb-3 gap-2">
  <a href="{{ url_for('accounts') }}" class="btn btn-outline-secondary btn-sm">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h5 class="fw-bold mb-0"><i class="bi bi-shuffle"></i> Transferencia entre cuentas</h5>
</div>

<div class="card" style="max-width:500px;">
  <div class="card-body">
    <form method="POST">
      <div class="row g-3">

        <div class="col-12">
          <label class="form-label fw-semibold">Cuenta origen</label>
          <select name="from_account_id" class="form-select" required>
            <option value="">— Seleccioná —</option>
            {% for acc in accounts %}
            <option value="{{ acc.id }}">
              {{ acc.name }} — ${{ "{:,.2f}".format(acc.current_balance) }} {{ acc.currency }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Cuenta destino</label>
          <select name="to_account_id" class="form-select" required>
            <option value="">— Seleccioná —</option>
            {% for acc in accounts %}
            <option value="{{ acc.id }}">{{ acc.name }} ({{ acc.currency }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-8">
          <label class="form-label fw-semibold">Monto</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" name="amount" step="0.01" min="0.01"
                   class="form-control" placeholder="0.00" required>
          </div>
        </div>

        <div class="col-4">
          <label class="form-label fw-semibold">Moneda</label>
          <select name="currency" class="form-select">
            <option value="ARS">ARS</option>
            <option value="USD">USD</option>
          </select>
        </div>

        <div class="col-6">
          <label class="form-label fw-semibold">Fecha</label>
          <input type="date" name="date" class="form-control" value="{{ today }}" required>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Descripción <span class="text-muted">(opcional)</span></label>
          <input type="text" name="description" class="form-control"
                 placeholder="Motivo de la transferencia...">
        </div>

        <div class="col-12 d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-shuffle"></i> Transferir
          </button>
          <a href="{{ url_for('accounts') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>

      </div>
    </form>
  </div>
</div>

{% endblock %}
