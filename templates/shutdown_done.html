<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aplicación cerrada — Nexar Finanzas</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { background:#1a1a2e; color:#eee; font-family:system-ui,sans-serif; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="text-center">
    <div style="font-size:4rem;">💰</div>
    <h4 class="mt-3 fw-bold">{{ titulo or 'Nexar Finanzas' }}</h4>
    <p class="text-secondary">{{ mensaje or 'El servidor se detuvo correctamente.' }}</p>

    <div id="countdown" class="mt-3 text-secondary small">
      Cerrando esta ventana en <span id="secs">3</span>…
    </div>

    <div class="mt-4">
      <p class="text-muted small">
        Para volver a abrir la app ejecutá:<br>
        <code style="color:#a8dadc;">python app.py</code>
        {% if sistema == 'Windows' %}
          &nbsp;ó doble clic en <code style="color:#a8dadc;">iniciar.bat</code>
        {% else %}
          &nbsp;ó ejecutá <code style="color:#a8dadc;">./iniciar.sh</code>
        {% endif %}
      </p>
    </div>
  </div>

  <script>
    // Intentar cerrar el tab. Solo funciona si lo abrió un script (ej: iniciar.bat)
    // Si el usuario abrió manualmente, el browser lo ignora y muestra la cuenta regresiva.
    let n = 3;
    const s = document.getElementById('secs');
    const iv = setInterval(() => {
      n--;
      if (s) s.textContent = n;
      if (n <= 0) {
        clearInterval(iv);
        window.close();
        // Si no se pudo cerrar (pestaña abierta manualmente), ocultar el countdown
        setTimeout(() => {
          const cd = document.getElementById('countdown');
          if (cd) cd.textContent = 'Podés cerrar esta pestaña manualmente.';
        }, 400);
      }
    }, 1000);
  </script>
</body>
</html>
