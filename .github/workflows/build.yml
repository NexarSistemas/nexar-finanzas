name: Build Nexar Finanzas

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # 🐧 BUILD LINUX (.deb + portable)
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar dependencias del sistema
      run: |
        sudo apt update
        sudo apt install -y \
          fakeroot \
          dpkg \
          python3-gi \
          python3-gi-cairo \
          gir1.2-webkit2-4.1

    - name: Dar permisos al script
      run: chmod +x build_scripts_linux/build.sh

    - name: Ejecutar build.sh
      run: bash build_scripts_linux/build.sh

    - name: Subir artefactos Linux
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: release/

  # 🪟 BUILD WINDOWS (portable ZIP + installer Inno Setup)
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar Inno Setup
      run: choco install innosetup -y

    - name: Ejecutar build.ps1
      run: powershell -ExecutionPolicy Bypass -File build_scripts_windows/build.ps1

    - name: Subir artefactos Windows
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: release/
