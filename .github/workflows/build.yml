name: Build & Release Nexar Finanzas

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════
  # 🔍 DETECTAR VERSION DESDE CHANGELOG
  # ════════════════════════════════════════
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Obtener versión desde CHANGELOG
        id: ver
        run: |
          VERSION=$(grep -m1 -oP '\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión detectada: $VERSION"

  # ════════════════════════════════════════
  # 🐧 BUILD LINUX
  # ════════════════════════════════════════
  build-linux:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y fakeroot dpkg python3-gi python3-gi-cairo gir1.2-webkit2-4.1

      - name: Ejecutar build
        run: |
          chmod +x build_scripts_linux/build.sh
          bash build_scripts_linux/build.sh

      - name: SHA256 Linux
        run: |
          cd release
          sha256sum * > SHA256SUMS_Linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/**/*

  # ════════════════════════════════════════
  # 🪟 BUILD WINDOWS
  # ════════════════════════════════════════
  build-windows:
    needs: check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Inno Setup
        run: choco install innosetup -y

      - name: Ejecutar build
        run: powershell -ExecutionPolicy Bypass -File build_scripts_windows/build.ps1

      - name: SHA256 Windows
        shell: pwsh
        run: |
          $out="release\SHA256SUMS_Windows.txt"
          Get-ChildItem release -File | Where-Object {$_.Name -notlike "*SHA256*"} | ForEach-Object {
            $h=(Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)" | Add-Content $out
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/**/*

  # ════════════════════════════════════════
  # 🔐 AGREGAR + FIRMAR + CHECKSUM GLOBAL
  # ════════════════════════════════════════
  package:
    needs: [check, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Aplanar artefactos
        run: |
          mkdir final
          find artifacts -type f -exec cp {} final/ \;

      - name: Generar SHA256 global
        run: |
          cd final
          sha256sum * > SHA256SUMS.txt

      - name: Configurar GPG
        run: |
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Importar clave
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Firmar binarios
        run: |
          find final -type f ! -name "*.sig" -exec \
          gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign {} \;

      - uses: actions/upload-artifact@v4
        with:
          name: final
          path: final/*

  # ════════════════════════════════════════
  # 🚀 RELEASE (IDEMPOTENTE)
  # ════════════════════════════════════════
  release:
    needs: [check, package]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefactos finales
        uses: actions/download-artifact@v4
        with:
          name: final
          path: final/

      # ✅ NUEVO: asegurar gh CLI
      - name: Instalar GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      # ✅ CLAVE: limpiar assets si ya existe la release
      - name: Limpiar assets existentes
        run: |
          TAG="v${{ needs.check.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release existe, limpiando assets..."

            for asset in $(gh release view "$TAG" --json assets -q '.assets[].name'); do
              echo "Eliminando $asset"
              gh release delete-asset "$TAG" "$asset" -y || true
            done
          else
            echo "Release no existe, no se limpia nada"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ✅ MEJORADO: generación robusta de descripción
      - name: Generar descripción desde CHANGELOG
        run: |
          VER="${{ needs.check.outputs.version }}"

          awk -v ver="$VER" '
          $0 ~ "\\["ver"\\]" {flag=1; next}
          /^## \[/ && flag {exit}
          flag
          ' CHANGELOG.md > release.md

          echo "----- RELEASE BODY -----"
          cat release.md

      # ✅ VALIDACIÓN (evita releases vacías)
      - name: Validar descripción
        run: |
          if [ ! -s release.md ]; then
            echo "ERROR: release.md está vacío"
            exit 1
          fi

      # 🚀 RELEASE FINAL
      - name: Crear release si no existe
        run: |
          TAG="v${{ needs.check.outputs.version }}"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Creando release..."
            gh release create "$TAG" \
              --title "Nexar Finanzas v${{ needs.check.outputs.version }}" \
              --notes-file release.md \
              --latest
          else
            echo "Release ya existe"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir archivos (sin conflictos reales)
        run: |
          TAG="v${{ needs.check.outputs.version }}"

          for file in final/*; do
            name=$(basename "$file")

            echo "Procesando $name..."

            # Intentar borrar si existe
            gh release delete-asset "$TAG" "$name" -y 2>/dev/null || true

            # Subir limpio
            gh release upload "$TAG" "$file"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}