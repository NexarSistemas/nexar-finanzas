name: Build & Release Nexar Finanzas

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════
  # 🔍 DETECTAR VERSION DESDE CHANGELOG
  # ════════════════════════════════════════
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Obtener versión desde CHANGELOG
        id: ver
        run: |
          VERSION=$(grep -m1 -oP '\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión detectada: $VERSION"

  # ════════════════════════════════════════
  # 🐧 BUILD LINUX
  # ════════════════════════════════════════
  build-linux:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y fakeroot dpkg python3-gi python3-gi-cairo gir1.2-webkit2-4.1

      - name: Ejecutar build
        run: |
          chmod +x build_scripts_linux/build.sh
          bash build_scripts_linux/build.sh

      - name: SHA256 Linux
        run: |
          cd release
          sha256sum * > SHA256SUMS_Linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/**/*

  # ════════════════════════════════════════
  # 🪟 BUILD WINDOWS
  # ════════════════════════════════════════
  build-windows:
    needs: check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Inno Setup
        run: choco install innosetup -y

      - name: Ejecutar build
        run: powershell -ExecutionPolicy Bypass -File build_scripts_windows/build.ps1

      - name: SHA256 Windows
        shell: pwsh
        run: |
          $out="release\SHA256SUMS_Windows.txt"
          Get-ChildItem release -File | Where-Object {$_.Name -notlike "*SHA256*"} | ForEach-Object {
            $h=(Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)" | Add-Content $out
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/**/*

  # ════════════════════════════════════════
  # 🔐 AGREGAR + FIRMAR + CHECKSUM GLOBAL
  # ════════════════════════════════════════
  package:
    needs: [check, build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Aplanar artefactos
        run: |
          mkdir final
          find artifacts -type f -exec cp {} final/ \;

      - name: Generar SHA256 global
        run: |
          cd final
          sha256sum * > SHA256SUMS.txt

      - name: Configurar GPG
        run: |
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Importar clave
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Firmar binarios
        run: |
          find final -type f ! -name "*.sig" -exec \
          gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign {} \;

      - uses: actions/upload-artifact@v4
        with:
          name: final
          path: final/*

  # ════════════════════════════════════════
  # 🚀 RELEASE (IDEMPOTENTE)
  # ════════════════════════════════════════
  release:
    needs: [check, package]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Descargar artefactos finales
        uses: actions/download-artifact@v4
        with:
          name: final
          path: final/

      - name: Generar descripción desde CHANGELOG
        run: |
          VER="${{ needs.check.outputs.version }}"
          awk "/## \[$VER\]/,/## \[/" CHANGELOG.md | sed '$d' > release.md

      - name: Crear o actualizar Release (sin duplicados)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: Nexar Finanzas v${{ needs.check.outputs.version }}
          body_path: release.md
          files: final/*
          prerelease: false
          make_latest: true
          append_body: false