name: Build & Release Nexar Finanzas

on:
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════
  # 🔍 DETECTAR VERSION DESDE CHANGELOG
  # ════════════════════════════════════════
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
      tag_exists: ${{ steps.tag.outputs.exists }}
      release_exists: ${{ steps.rel.outputs.exists }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obtener versión desde CHANGELOG
        id: ver
        run: |
          VERSION=$(grep -m1 -oP '\[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión detectada: $VERSION"

      - name: Verificar tag
        id: tag
        run: |
          if git rev-parse "v${{ steps.ver.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Verificar release
        id: rel
        run: |
          if gh release view "v${{ steps.ver.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════
  # 🐧 BUILD LINUX
  # ════════════════════════════════════════
  build-linux:
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y fakeroot dpkg python3-gi python3-gi-cairo gir1.2-webkit2-4.1

      - name: Ejecutar build
        run: |
          chmod +x build_scripts_linux/build.sh
          bash build_scripts_linux/build.sh

      - name: SHA256 Linux
        run: |
          cd release
          sha256sum * > SHA256SUMS_Linux.txt

      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ needs.check.outputs.version }}
          path: release/

  # ════════════════════════════════════════
  # 🪟 BUILD WINDOWS
  # ════════════════════════════════════════
  build-windows:
    needs: check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Inno Setup
        run: choco install innosetup -y

      - name: Ejecutar build
        run: powershell -ExecutionPolicy Bypass -File build_scripts_windows/build.ps1

      - name: SHA256 Windows
        shell: pwsh
        run: |
          $out="release\SHA256SUMS_Windows.txt"
          Get-ChildItem release -File | Where-Object {$_.Name -notlike "*SHA256*"} | ForEach-Object {
            $h=(Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$h  $($_.Name)" | Add-Content $out
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ needs.check.outputs.version }}
          path: release/

  # ════════════════════════════════════════
  # 🔐 FIRMA GPG
  # ════════════════════════════════════════
  sign:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Configurar GPG
        run: |
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Importar clave
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Firmar
        run: |
          find release -type f ! -name "*.sig" -exec \
          gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign {} \;

      - uses: actions/upload-artifact@v4
        with:
          name: signed
          path: release/

  # ════════════════════════════════════════
  # 🚀 RELEASE
  # ════════════════════════════════════════
  release:
    needs: [check, sign]
    if: |
      needs.check.outputs.tag_exists == 'false' ||
      needs.check.outputs.release_exists == 'false'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Usar versión
        id: ver
        run: echo "VERSION=${{ needs.check.outputs.version }}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: signed
          path: release/

      - name: Generar descripción desde CHANGELOG
        run: |
          VER="${{ steps.ver.outputs.VERSION }}"
          awk "/## \[$VER\]/,/## \[/" CHANGELOG.md | sed '$d' > release.md

      - name: Crear tag si no existe
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag v${{ steps.ver.outputs.VERSION }} || true
          git push origin v${{ steps.ver.outputs.VERSION }} || true

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.VERSION }}
          name: Nexar Finanzas v${{ steps.ver.outputs.VERSION }}
          body_path: release.md
          prerelease: false
          files: release/**/*