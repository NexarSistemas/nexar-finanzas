name: Build & Release Nexar Finanzas

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # 🔍 VERSION
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4

      - name: Obtener versión desde VERSION
        id: ver
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ VERSION debe tener formato semver X.Y.Z"
            exit 1
          fi
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md no tiene entrada ## [$VERSION]"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión detectada: $VERSION"

  # 🐧 BUILD LINUX
  build-linux:
    needs: check
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      VERSION: ${{ needs.check.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Verificar secretos de build
        env:
          SDK_DEPLOY_KEY: ${{ secrets.NEXAR_LICENCIAS_DEPLOY_KEY }}
        run: |
          if [ -z "$SECRET_KEY" ]; then
            echo "❌ SECRET_KEY no está definida"
            exit 1
          fi
          if [ -z "$SDK_DEPLOY_KEY" ]; then
            echo "❌ NEXAR_LICENCIAS_DEPLOY_KEY no está definida"
            exit 1
          fi

      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y \
            fakeroot \
            dpkg \
            libegl1 \
            libgl1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0

      - name: Configurar acceso SSH a nexar_licencias
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NEXAR_LICENCIAS_DEPLOY_KEY }}

      - name: Confiar en github.com para dependencias SSH
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Build Linux
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          chmod +x build_scripts_linux/build.sh
          bash build_scripts_linux/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/**/*
          if-no-files-found: error
          retention-days: 2

  # 🪟 BUILD WINDOWS
  build-windows:
    needs: check
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      VERSION: ${{ needs.check.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Verificar secretos de build
        shell: bash
        env:
          SDK_DEPLOY_KEY: ${{ secrets.NEXAR_LICENCIAS_DEPLOY_KEY }}
        run: |
          if [ -z "$SECRET_KEY" ]; then
            echo "❌ SECRET_KEY no está definida"
            exit 1
          fi
          if [ -z "$SDK_DEPLOY_KEY" ]; then
            echo "❌ NEXAR_LICENCIAS_DEPLOY_KEY no está definida"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Inno Setup
        run: choco install innosetup -y

      - name: Configurar acceso SSH a nexar_licencias
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.NEXAR_LICENCIAS_DEPLOY_KEY }}

      - name: Confiar en github.com para dependencias SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Build Windows
        env:
          PUBLIC_KEY: ${{ secrets.PUBLIC_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VERSION: ${{ needs.check.outputs.version }}
        run: powershell -ExecutionPolicy Bypass -File build_scripts_windows/build.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/**/*
          if-no-files-found: error
          retention-days: 2

  # 📦 PACKAGE + SHA256 + FIRMA
  package:
    needs: [check, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Unificar artefactos
        run: |
          mkdir -p dist/release/artifacts
          find artifacts -type f -exec cp {} dist/release/artifacts/ \;

      - name: Validar instaladores
        run: |
          shopt -s nullglob
          installers=(dist/release/artifacts/*.deb dist/release/artifacts/*.exe dist/release/artifacts/*.zip dist/release/artifacts/*.tar.gz)
          if [ ${#installers[@]} -eq 0 ]; then
            echo "❌ No se encontraron instaladores en dist/release/artifacts"
            exit 1
          fi
          printf '✅ Instaladores encontrados:\n'
          printf ' - %s\n' "${installers[@]}"

      - name: Limpiar basura legacy (CRÍTICO)
        run: |
          rm -f dist/release/artifacts/SHA256SUMS_*.txt
          rm -f dist/release/artifacts/SHA256SUMS-*.txt
          rm -f dist/release/artifacts/*.sha256

      - name: Generar SHA256 único
        run: |
          cd dist/release/artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Configurar GPG
        run: |
          mkdir -p ~/.gnupg
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent

      - name: Importar clave GPG
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Firmar archivos
        run: |
          find dist/release/artifacts -type f ! -name "*.sig" -exec \
          gpg --batch --yes \
              --pinentry-mode loopback \
              --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
              --detach-sign {} \;

      - uses: actions/upload-artifact@v4
        with:
          name: final
          path: dist/release/artifacts/*
          if-no-files-found: error
          retention-days: 2

  # 🚀 RELEASE
  release:
    needs: [check, package]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: final
          path: dist/release/artifacts/

      - name: Validar instaladores antes de publicar
        run: |
          shopt -s nullglob
          installers=(dist/release/artifacts/*.deb dist/release/artifacts/*.exe dist/release/artifacts/*.zip dist/release/artifacts/*.tar.gz)
          if [ ${#installers[@]} -eq 0 ]; then
            echo "❌ No se encontraron instaladores en dist/release/artifacts; no se creará una release vacía"
            exit 1
          fi
          printf '✅ Instaladores listos para publicar:\n'
          printf ' - %s\n' "${installers[@]}"

      - name: Instalar GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh

      # 🔍 Check release existente (PRO)
      - name: Check release exists
        id: release_check
        run: |
          TAG="v${{ needs.check.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar descripción desde CHANGELOG
        run: |
          VER="${{ needs.check.outputs.version }}"
          awk -v ver="$VER" '
          $0 ~ "## \\["ver"\\]" {flag=1; next}
          /^## \[/ && flag {exit}
          flag
          ' CHANGELOG.md > release.md
          if [ ! -s release.md ]; then
            echo "❌ release.md quedó vacío; revisar formato de CHANGELOG.md"
            exit 1
          fi

      - name: Crear release
        if: steps.release_check.outputs.exists == 'false'
        run: |
          TAG="v${{ needs.check.outputs.version }}"

          gh release create "$TAG" \
            --title "Nexar Finanzas v${{ needs.check.outputs.version }}" \
            --notes-file release.md \
            --latest \
            --target $GITHUB_SHA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Subir assets (robusto sin conflictos)
        run: |
          TAG="v${{ needs.check.outputs.version }}"

          for file in dist/release/artifacts/*; do
            name=$(basename "$file")

            echo "Procesando $name..."

            gh release delete-asset "$TAG" "$name" -y 2>/dev/null || true
            gh release upload "$TAG" "$file"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
